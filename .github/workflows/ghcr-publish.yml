name: Build and push to GHCR

# Builds the image and pushes it to the GitHub Container Registry (ghcr.io) on
# every push to main. Unlike the Docker Hub workflow this needs no secrets — it
# authenticates with the automatic GITHUB_TOKEN, which the permissions block
# below grants package-write access.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Emulation so the amd64 runner can build the arm legs.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Same matrix as the Docker Hub build: amd64 (native) + arm64 + arm/v7.
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          # ghcr image names must be lowercase (owner is "Awu05").
          tags: |
            ghcr.io/awu05/mta-tracker:latest
            ghcr.io/awu05/mta-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
