name: Build and push Docker image

# Builds the image and pushes it to Docker Hub on every push to main.
# Requires two repo secrets (Settings > Secrets and variables > Actions):
#   DOCKERHUB_USERNAME  - your Docker Hub username (e.g. awu05)
#   DOCKERHUB_TOKEN     - a Docker Hub access token with Read/Write scope
#                         (https://hub.docker.com/settings/security)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Emulation so the amd64 runner can build the arm image.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 (x86 servers/desktops, builds natively on the runner) +
          # arm64 (e.g. Pi Zero 2 W on 64-bit OS) + arm/v7 (32-bit ARM hosts).
          # The arm legs build under emulation (QEMU), so they dominate build time.
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mta-tracker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mta-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
