name: Build and push Docker image

# Builds the image and pushes it to Docker Hub on every push to main.
# Requires two repo secrets (Settings > Secrets and variables > Actions):
#   DOCKERHUB_USERNAME  - your Docker Hub username (e.g. awu05)
#   DOCKERHUB_TOKEN     - a Docker Hub access token with Read/Write scope
#                         (https://hub.docker.com/settings/security)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Emulation so the amd64 runner can build the arm image.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Pi Zero 2 W is arm64. Add ,linux/arm/v7 here for 32-bit hosts too
          # (roughly doubles build time under emulation).
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mta-tracker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mta-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
