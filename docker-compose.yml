services:
  mta-tracker:
    # Prebuilt multi-arch image on Docker Hub (arm64 + arm/v7) — pull it on
    # low-power hosts (e.g. a Pi Zero) instead of building locally:
    #   docker compose pull && docker compose up -d
    # `build: .` is kept so you can still build from source on a capable machine.
    image: awu05/mta-tracker:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://mta:mta@db:5432/mta
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mta
      POSTGRES_PASSWORD: mta
      POSTGRES_DB: mta
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mta"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
