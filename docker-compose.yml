services:
  mta-tracker:
    # Prebuilt multi-arch image on Docker Hub (arm64 + arm/v7) — pull it on
    # low-power hosts (e.g. a Pi Zero) instead of building locally:
    #   docker compose pull && docker compose up -d
    # `build: .` is kept so you can still build from source on a capable machine.
    image: awu05/mta-tracker:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - mta-data:/app/data

volumes:
  mta-data:
