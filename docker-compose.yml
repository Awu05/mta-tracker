services:
  mta-tracker:
    # Prebuilt multi-arch image on GHCR (amd64 + arm64 + arm/v7) — pull it on
    # low-power hosts (e.g. a Pi Zero) instead of building locally:
    #   docker compose pull && docker compose up -d
    # `build: .` is kept so you can still build from source on a capable machine.
    image: ghcr.io/awu05/mta-tracker:latest
    build: .
    restart: unless-stopped
    ports:
      # Map host -> container on the same PORT the app listens on inside the
      # container (config reads PORT from .env; default 8080). Compose substitutes
      # ${PORT} from the project-root .env file.
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://mta:mta@db:5432/mta
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mta
      POSTGRES_PASSWORD: mta
      POSTGRES_DB: mta
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mta"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
